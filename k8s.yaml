  labels:
    app.kubernetes.io/part-of: donaton

---
apiVersion: v1
kind: Secret
metadata:
  name: donaton-shared-secret
  namespace: donaton
  labels:
    app.kubernetes.io/part-of: donaton
type: Opaque
stringData:
