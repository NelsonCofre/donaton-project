kind: Deployment
metadata:
  name: api-gateway
  namespace: donaton
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: donaton
    app.kubernetes.io/component: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/part-of: donaton
        app.kubernetes.io/component: gateway
    spec:
      containers:
        - name: api-gateway
          image: donaton/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
              name: http
          readinessProbe:
            tcpSocket:
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8090
            initialDelaySeconds: 15
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: donaton
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: donaton
    app.kubernetes.io/component: gateway
spec:
  type: NodePort
  ports:
    - port: 8090
      targetPort: 8090
      nodePort: 30090
      name: http
  selector:
    app.kubernetes.io/name: api-gateway
