services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - bff-service

  bff-service:
    build:
      context: ./backend/bff-service
      dockerfile: Dockerfile
    ports:
      - "${BFF_PORT:-8080}:8080"
    environment:
      SERVER_PORT: 8080
      APP_SERVICES_AUTH_BASE_URL: http://auth-service:8081
      APP_SERVICES_DONATION_BASE_URL: http://donation-service:8082
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    depends_on:
      auth-service:
        condition: service_started
      donation-service:
        condition: service_started

  postgres-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: "Informatica.25"
      POSTGRES_DB: "auth-db"
    ports:
      - "5435:5432"
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d auth-db"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-auth:5432/auth-db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "Informatica.25"
      JWT_SECRET: ${AUTH_SERVICE_JWT_SECRET:-default-local-auth-secret-minimum-32-characters-long!!}
      APP_CORS_ALLOWED_ORIGINS: ${AUTH_SERVICE_CORS_ORIGIN:-http://localhost:5173}
    depends_on:
      postgres-auth:
        condition: service_healthy

  postgres-donation:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: donation
      POSTGRES_PASSWORD: donation
      POSTGRES_DB: donation_db
    ports:
      - "5436:5432"
    volumes:
      - postgres-donation-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U donation -d donation_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  donation-service:
    build:
      context: ./backend/donation-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-donation:5432/donation_db
      SPRING_DATASOURCE_USERNAME: donation
      SPRING_DATASOURCE_PASSWORD: donation
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
    depends_on:
      postgres-donation:
        condition: service_healthy

volumes:
  postgres-auth-data:
  postgres-donation-data:
