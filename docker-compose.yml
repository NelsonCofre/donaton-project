services:
  postgres-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: auth_db
    ports:
      - "5435:5432"
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-auth:5432/auth_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
      JWT_SECRET: ${AUTH_SERVICE_JWT_SECRET:-default-local-auth-secret-minimum-32-characters-long!!}
      APP_CORS_ALLOWED_ORIGINS: ${AUTH_SERVICE_CORS_ORIGIN:-http://localhost:5173}
    depends_on:
      postgres-auth:
        condition: service_healthy

volumes:
  postgres-auth-data:
