# PostgreSQL del microservicio de logística.
# Service DNS interno: postgres-logistics.donaton.svc.cluster.local:5432

apiVersion: v1
kind: Secret
metadata:
  name: postgres-logistics-secret
  namespace: donaton
  labels:
    app.kubernetes.io/name: postgres-logistics
    app.kubernetes.io/part-of: donaton
    app.kubernetes.io/component: database
type: Opaque
stringData:
  POSTGRES_USER: logistic
  POSTGRES_PASSWORD: logistic
  POSTGRES_DB: logistics_db

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-logistics
  namespace: donaton
  labels:
    app.kubernetes.io/name: postgres-logistics
    app.kubernetes.io/part-of: donaton
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app.kubernetes.io/name: postgres-logistics

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-logistics
  namespace: donaton
  labels:
    app.kubernetes.io/name: postgres-logistics
    app.kubernetes.io/part-of: donaton
    app.kubernetes.io/component: database
spec:
  serviceName: postgres-logistics
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-logistics
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-logistics
        app.kubernetes.io/part-of: donaton
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: postgres-logistics-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - logistic
                - -d
                - logistics_db
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - logistic
                - -d
                - logistics_db
            initialDelaySeconds: 15
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logistics-service
  namespace: donaton
  labels:
    app.kubernetes.io/name: logistics-service
    app.kubernetes.io/part-of: donaton
    app.kubernetes.io/component: microservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: logistics-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: logistics-service
        app.kubernetes.io/part-of: donaton
        app.kubernetes.io/component: microservice
    spec:
      containers:
        - name: logistics-service
          image: donaton/ms-logistic:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
              name: http
          env:
            - name: SERVER_PORT
              value: "8084"
            - name: SPRING_APPLICATION_NAME
              value: logistics-service
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres-logistics:5432/logistics_db
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-logistics-secret
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-logistics-secret
                  key: POSTGRES_PASSWORD
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: validate
            - name: SPRING_FLYWAY_ENABLED
              value: "true"
          readinessProbe:
            tcpSocket:
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8084
            initialDelaySeconds: 60
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: logistics-service
  namespace: donaton
  labels:
    app.kubernetes.io/name: logistics-service
    app.kubernetes.io/part-of: donaton
    app.kubernetes.io/component: microservice
spec:
  type: NodePort
  ports:
    - port: 8084
      targetPort: 8084
      nodePort: 30084
      name: http
  selector:
    app.kubernetes.io/name: logistics-service
