# Perfil test: H2 en memoria; Hibernate crea y destruye el esquema (create-drop).
# Flyway desactivado: las migraciones SQL bajo db/migration son para PostgreSQL en runtime.
spring.datasource.url=jdbc:h2:mem:donation_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=false
