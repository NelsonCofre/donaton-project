# Stack local: PostgreSQL + microservicio donation-service (red interna donation-net).
name: donation-service-stack

services:
  postgres-donation:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-donation}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-donation}
      POSTGRES_DB: ${POSTGRES_DB:-donation_db}
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5436}:5432"
    volumes:
      - donation-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - donation-net

  donation-service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${DONATION_SERVICE_PORT:-8082}:${SERVER_PORT:-8082}"
    environment:
      SERVER_PORT: ${SERVER_PORT:-8082}
      SPRING_APPLICATION_NAME: ${SPRING_APPLICATION_NAME:-donation-service}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-donation:5432/${POSTGRES_DB:-donation_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-donation}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-donation}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-validate}
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED:-true}
      SPRING_FLYWAY_LOCATIONS: ${SPRING_FLYWAY_LOCATIONS:-classpath:db/migration}
      LOGGING_LEVEL_ROOT: ${LOGGING_LEVEL_ROOT:-INFO}
    depends_on:
      postgres-donation:
        condition: service_healthy
    networks:
      - donation-net

networks:
  donation-net:
    driver: bridge

volumes:
  donation-pg-data:
