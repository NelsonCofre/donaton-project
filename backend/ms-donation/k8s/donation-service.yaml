# PostgreSQL del microservicio de donaciones.
# Service DNS interno: postgres-donation.donaton.svc.cluster.local:5432

apiVersion: v1
kind: Secret
metadata:
  name: postgres-donation-secret
  namespace: donaton
  labels:
    app.kubernetes.io/name: postgres-donation
    app.kubernetes.io/part-of: donaton
    app.kubernetes.io/component: database
type: Opaque
stringData:
  POSTGRES_USER: donation
  POSTGRES_PASSWORD: donation
  POSTGRES_DB: donation_db

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-donation
  namespace: donaton
  labels:
    app.kubernetes.io/name: postgres-donation
    app.kubernetes.io/part-of: donaton
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app.kubernetes.io/name: postgres-donation

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-donation
  namespace: donaton
  labels:
    app.kubernetes.io/name: postgres-donation
    app.kubernetes.io/part-of: donaton
    app.kubernetes.io/component: database
spec:
  serviceName: postgres-donation
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-donation
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-donation
        app.kubernetes.io/part-of: donaton
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: postgres-donation-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - donation
                - -d
                - donation_db
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - donation
                - -d
                - donation_db
            initialDelaySeconds: 15
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: donation-service
  namespace: donaton
  labels:
    app.kubernetes.io/name: donation-service
    app.kubernetes.io/part-of: donaton
    app.kubernetes.io/component: microservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: donation-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: donation-service
        app.kubernetes.io/part-of: donaton
        app.kubernetes.io/component: microservice
    spec:
      containers:
        - name: donation-service
          image: donaton/ms-donation:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
              name: http
          env:
            - name: SERVER_PORT
              value: "8082"
            - name: SPRING_APPLICATION_NAME
              value: donation-service
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres-donation:5432/donation_db
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-donation-secret
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-donation-secret
                  key: POSTGRES_PASSWORD
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: validate
            - name: SPRING_FLYWAY_ENABLED
              value: "true"
          readinessProbe:
            tcpSocket:
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: donation-service
  namespace: donaton
  labels:
    app.kubernetes.io/name: donation-service
    app.kubernetes.io/part-of: donaton
    app.kubernetes.io/component: microservice
spec:
  type: ClusterIP
  ports:
    - port: 8082
      targetPort: 8082
      name: http
  selector:
    app.kubernetes.io/name: donation-service
