spring.application.name=auth-service
server.port=8081

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/auth-db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Informatica.25}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.serialization.write-dates-as-timestamps=false

app.jwt.secret=${JWT_SECRET:default-local-auth-secret-minimum-32-characters-long!!}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}