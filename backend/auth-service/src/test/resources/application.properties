spring.datasource.url=jdbc:h2:mem:authservice;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.flyway.enabled=false
security.jwt.secret=test-secret-key-with-at-least-32-characters!!
security.jwt.access-token-expiration-minutes=15
security.jwt.refresh-token-expiration-days=7
