spring.application.name=bff-service
server.port=${SERVER_PORT:8080}

app.services.auth.base-url=${APP_SERVICES_AUTH_BASE_URL:http://localhost:8081}
app.services.donation.base-url=${APP_SERVICES_DONATION_BASE_URL:http://localhost:8082}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
